<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <style>
      .frame-content {
        background: #09090b !important;
        color: #f4f4f5 !important;
      }
      /* Hide the backend (GitHub) status incident banner */
      [style*="--sui-infobar-message-justify-content"] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      // Preview styles injected into the preview iframe
      var previewStyles = '\
        body {\
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;\
          background: #09090b;\
          color: #f4f4f5;\
          line-height: 1.7;\
          padding: 24px 32px;\
          max-width: 800px;\
          margin: 0 auto;\
          -webkit-font-smoothing: antialiased;\
        }\
        h1, h2, h3, h4, h5, h6 {\
          color: #fafafa;\
          line-height: 1.3;\
          margin-top: 1.5em;\
          margin-bottom: 0.5em;\
        }\
        h1 { font-size: 1.875rem; font-weight: 700; margin-top: 0; }\
        h2 { font-size: 1.5rem; font-weight: 600; }\
        h3 { font-size: 1.25rem; font-weight: 600; }\
        p { margin-bottom: 1em; color: #d4d4d8; }\
        a { color: #3b82f6; text-decoration: underline; }\
        a:hover { color: #60a5fa; }\
        img {\
          max-width: 100%;\
          height: auto;\
          border-radius: 8px;\
          margin: 16px 0;\
        }\
        blockquote {\
          border-left: 3px solid #3f3f46;\
          padding-left: 16px;\
          margin-left: 0;\
          color: #a1a1aa;\
          font-style: italic;\
        }\
        code {\
          background: #27272a;\
          padding: 2px 6px;\
          border-radius: 4px;\
          font-size: 0.875em;\
          color: #e4e4e7;\
        }\
        pre {\
          background: #18181b;\
          border: 1px solid #27272a;\
          border-radius: 8px;\
          padding: 16px;\
          overflow-x: auto;\
          margin: 16px 0;\
        }\
        pre code { background: none; padding: 0; }\
        ul, ol { padding-left: 24px; margin-bottom: 1em; color: #d4d4d8; }\
        li { margin-bottom: 0.25em; }\
        hr { border: none; border-top: 1px solid #27272a; margin: 2em 0; }\
        .post-meta { font-size: 0.875rem; color: #71717a; margin-bottom: 24px; }\
        .post-tag {\
          display: inline-block;\
          background: #27272a;\
          color: #a1a1aa;\
          padding: 2px 8px;\
          border-radius: 9999px;\
          font-size: 0.75rem;\
          margin-right: 6px;\
        }\
        .post-image {\
          width: 100%;\
          border-radius: 8px;\
          margin-bottom: 24px;\
          object-fit: cover;\
          max-height: 400px;\
        }\
        .post-description {\
          color: #a1a1aa;\
          font-size: 1.05rem;\
          margin-bottom: 24px;\
          padding-bottom: 16px;\
          border-bottom: 1px solid #27272a;\
        }\
      ';

      CMS.registerPreviewStyle(previewStyles, { raw: true });

      // Post preview template
      var PostPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var description = entry.getIn(['data', 'description']) || '';
          var image = entry.getIn(['data', 'image']);
          var imageAlt = entry.getIn(['data', 'imageAlt']) || '';
          var tags = entry.getIn(['data', 'tags']);
          var pubDate = entry.getIn(['data', 'pubDate']);
          var body = this.props.widgetFor('body');

          var dateStr = pubDate
            ? new Date(pubDate).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric',
              })
            : '';

          return h('article', {},
            image && h('img', { className: 'post-image', src: this.props.getAsset(image).toString(), alt: imageAlt }),
            h('h1', {}, title),
            h('div', { className: 'post-meta' },
              dateStr,
              tags && tags.size > 0 && h('span', {},
                ' · ',
                tags.map(function(tag) { return h('span', { className: 'post-tag', key: tag }, tag); })
              )
            ),
            description && h('p', { className: 'post-description' }, description),
            h('div', {}, body)
          );
        },
      });
      CMS.registerPreviewTemplate('posts', PostPreview);

      // ── Theme preview template ──────────────────────────────────────
      var ThemePreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var d = entry.get('data');
          var getAsset = this.props.getAsset;

          // Fonts
          var fonts = d.get('fonts') || Immutable.Map();
          var headingFont = fonts.get('heading') || 'system-ui, sans-serif';
          var bodyFont = fonts.get('body') || 'system-ui, sans-serif';
          var headingScale = parseFloat(fonts.get('headingSize') || '1');
          var bodyScale = parseFloat(fonts.get('bodySize') || '1');

          // Background image
          var bgImg = d.get('backgroundImage') || Immutable.Map();
          var bgUrl = bgImg.get('url') || '';
          var bgSize = bgImg.get('size') || 'cover';
          var bgPos = bgImg.get('position') || 'center center';
          var bgAttach = bgImg.get('attachment') || 'fixed';
          var bgBlur = parseInt(bgImg.get('blur') || '0', 10);

          // Resolve the image asset if present
          var bgSrc = '';
          if (bgUrl) {
            try { bgSrc = getAsset(bgUrl).toString(); } catch(e) { bgSrc = bgUrl; }
          }

          // Colors — show light mode in left half, dark in right half
          var lt = d.get('light') || Immutable.Map();
          var dk = d.get('dark') || Immutable.Map();

          function c(palette, key, fallback) {
            return palette.get(key) || fallback || 'transparent';
          }

          // Load Google Fonts in preview
          function extractFont(cssVal) {
            var m = cssVal.match(/^'([^']+)'/);
            return m ? m[1] : null;
          }
          var gFonts = {};
          [headingFont, bodyFont].forEach(function(f) { var n = extractFont(f); if (n) gFonts[n] = true; });
          var fontUrl = Object.keys(gFonts).length
            ? 'https://fonts.googleapis.com/css2?' + Object.keys(gFonts).map(function(f) { return 'family=' + f.replace(/ /g, '+') + ':wght@300;400;500;600;700'; }).join('&') + '&display=swap'
            : null;

          // ── Render a single mode panel ──
          function renderPanel(palette, isDark, label) {
            var bg = c(palette, 'background', isDark ? '#09090b' : '#fff');
            var surface = c(palette, 'surface', isDark ? '#18181b' : '#fff');
            var surfaceBorder = c(palette, 'surfaceBorder');
            var text = c(palette, 'text', isDark ? '#f4f4f5' : '#18181b');
            var textMuted = c(palette, 'textMuted', isDark ? '#a1a1aa' : '#52525b');
            var textFaint = c(palette, 'textFaint', isDark ? '#71717a' : '#71717a');
            var primary = c(palette, 'primary', '#3b82f6');
            var primaryHover = c(palette, 'primaryHover');
            var accent = c(palette, 'accent', '#8b5cf6');
            var border = c(palette, 'border', isDark ? '#27272a' : '#e4e4e7');
            var inputBg = c(palette, 'inputBg');
            var inputBorder = c(palette, 'inputBorder');
            var tag = c(palette, 'tag');
            var tagText = c(palette, 'tagText');
            var cardBg = c(palette, 'cardBg', surface);
            var cardBorder = c(palette, 'cardBorder', border);
            var headerBg = c(palette, 'headerBg', bg);
            var footerBg = c(palette, 'footerBg', bg);

            return h('div', { style: {
              position: 'relative', overflow: 'hidden',
              borderRadius: '12px', border: '1px solid ' + border,
              fontFamily: bodyFont, fontSize: (14 * bodyScale) + 'px',
              marginBottom: '20px',
            }},
              // Background image layer
              bgSrc && h('div', { style: {
                position: 'absolute', inset: bgBlur > 0 ? '-' + (bgBlur + 10) + 'px' : '0',
                backgroundImage: 'url(' + bgSrc + ')',
                backgroundSize: bgSize, backgroundPosition: bgPos,
                backgroundRepeat: 'no-repeat',
                filter: bgBlur > 0 ? 'blur(' + bgBlur + 'px)' : 'none',
                zIndex: 0,
              }}),
              // Body background color overlay
              h('div', { style: {
                position: 'absolute', inset: '0', backgroundColor: bg, zIndex: 1,
                opacity: bgSrc ? 0.85 : 1,
              }}),

              // Content
              h('div', { style: { position: 'relative', zIndex: 2 }},

                // Header
                h('div', { style: {
                  padding: '10px 16px', borderBottom: '1px solid ' + border,
                  backgroundColor: headerBg, display: 'flex', alignItems: 'center',
                  justifyContent: 'space-between',
                  backdropFilter: bgSrc ? 'blur(12px)' : 'none',
                }},
                  h('span', { style: { fontFamily: headingFont, fontWeight: 700, color: text, fontSize: (16 * headingScale) + 'px' }}, label),
                  h('div', { style: { display: 'flex', gap: '12px', alignItems: 'center' }},
                    h('span', { style: { color: textMuted, fontSize: '12px' }}, 'Posts'),
                    h('span', { style: { color: textMuted, fontSize: '12px' }}, 'Galleries'),
                    h('span', { style: { color: textMuted, fontSize: '12px' }}, 'Social'),
                    h('span', { style: {
                      backgroundColor: primary, color: '#fff', padding: '3px 10px',
                      borderRadius: '6px', fontSize: '11px', fontWeight: 500,
                    }}, 'Sign In')
                  )
                ),

                // Body area
                h('div', { style: { padding: '16px', backgroundColor: 'transparent' }},

                  // Page heading
                  h('h2', { style: {
                    fontFamily: headingFont, color: text,
                    fontSize: (22 * headingScale) + 'px', fontWeight: 700,
                    margin: '0 0 4px 0',
                  }}, 'Page Heading'),
                  h('p', { style: { color: textMuted, fontSize: '13px', margin: '0 0 16px 0' }}, 'A description of this page in muted text'),

                  // Card
                  h('div', { style: {
                    backgroundColor: cardBg, border: '1px solid ' + cardBorder,
                    borderRadius: '10px', padding: '14px', marginBottom: '14px',
                  }},
                    h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-start' }},
                      h('div', { style: {
                        width: '36px', height: '36px', borderRadius: '50%',
                        backgroundColor: accent, flexShrink: 0,
                      }}),
                      h('div', { style: { flex: 1 }},
                        h('div', { style: { display: 'flex', gap: '6px', alignItems: 'baseline' }},
                          h('span', { style: { color: text, fontWeight: 600, fontSize: '13px' }}, 'Jane Doe'),
                          h('span', { style: { color: textFaint, fontSize: '11px' }}, '2 hours ago')
                        ),
                        h('p', { style: { color: text, margin: '6px 0 10px', fontSize: '13px', lineHeight: '1.5' }},
                          'Check out this amazing sunset I captured at the coast! ',
                          h('a', { style: { color: primary, textDecoration: 'underline' }}, '#photography')
                        ),
                        h('div', { style: {
                          backgroundColor: inputBg, height: '120px', borderRadius: '8px',
                          border: '1px solid ' + border, marginBottom: '10px',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          overflow: 'hidden',
                        }},
                          bgSrc
                            ? h('img', { src: bgSrc, style: { width: '100%', height: '100%', objectFit: 'cover' }})
                            : h('span', { style: { color: textFaint, fontSize: '11px' }}, 'Photo')
                        ),
                        // Tags
                        h('div', { style: { display: 'flex', gap: '6px', marginBottom: '8px' }},
                          h('span', { style: { backgroundColor: tag, color: tagText, padding: '2px 8px', borderRadius: '9999px', fontSize: '11px' }}, 'sunset'),
                          h('span', { style: { backgroundColor: tag, color: tagText, padding: '2px 8px', borderRadius: '9999px', fontSize: '11px' }}, 'coast')
                        ),
                        // Actions
                        h('div', { style: { display: 'flex', gap: '14px' }},
                          h('span', { style: { color: textMuted, fontSize: '11px' }}, '\u2661 12'),
                          h('span', { style: { color: textMuted, fontSize: '11px' }}, '\uD83D\uDCAC 3'),
                          h('span', { style: { color: accent, fontSize: '11px' }}, '\u21AA Share')
                        )
                      )
                    )
                  ),

                  // Input row
                  h('div', { style: { display: 'flex', gap: '8px', marginBottom: '14px' }},
                    h('input', { readOnly: true, value: 'Type something...', style: {
                      flex: 1, backgroundColor: inputBg, border: '1px solid ' + inputBorder,
                      borderRadius: '6px', padding: '7px 10px', color: textFaint, fontSize: '12px',
                      outline: 'none',
                    }}),
                    h('span', { style: {
                      backgroundColor: primary, color: '#fff', padding: '7px 14px',
                      borderRadius: '6px', fontSize: '12px', fontWeight: 500,
                    }}, 'Post')
                  ),

                  // Buttons row
                  h('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' }},
                    h('span', { style: {
                      backgroundColor: primary, color: '#fff', padding: '6px 14px',
                      borderRadius: '6px', fontSize: '12px', fontWeight: 500,
                    }}, 'Primary Button'),
                    h('span', { style: {
                      backgroundColor: accent, color: '#fff', padding: '6px 14px',
                      borderRadius: '6px', fontSize: '12px', fontWeight: 500,
                    }}, 'Accent Button'),
                    h('span', { style: {
                      backgroundColor: 'transparent', color: text, padding: '5px 14px',
                      borderRadius: '6px', fontSize: '12px', fontWeight: 500,
                      border: '1px solid ' + border,
                    }}, 'Outline')
                  )
                ),

                // Footer
                h('div', { style: {
                  padding: '10px 16px', borderTop: '1px solid ' + border,
                  backgroundColor: footerBg, textAlign: 'center',
                }},
                  h('span', { style: { color: textFaint, fontSize: '11px' }},
                    'Powered by ', h('a', { style: { color: primary, textDecoration: 'underline' }}, 'Pirate Social')
                  )
                )
              )
            );
          }

          return h('div', { style: { padding: '20px 24px', fontFamily: bodyFont, maxWidth: '900px', margin: '0 auto' }},
            fontUrl && h('link', { rel: 'stylesheet', href: fontUrl }),

            // Section: Background Image
            bgSrc && h('div', { style: { marginBottom: '24px' }},
              h('h3', { style: { fontFamily: headingFont, fontSize: '14px', fontWeight: 600, color: '#a1a1aa', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '10px' }}, 'Background Image Preview'),
              h('div', { style: {
                position: 'relative', height: '140px', borderRadius: '10px', overflow: 'hidden',
                border: '1px solid #27272a',
              }},
                h('div', { style: {
                  position: 'absolute',
                  inset: bgBlur > 0 ? '-' + (bgBlur + 10) + 'px' : '0',
                  backgroundImage: 'url(' + bgSrc + ')',
                  backgroundSize: bgSize, backgroundPosition: bgPos,
                  backgroundRepeat: 'no-repeat',
                  filter: bgBlur > 0 ? 'blur(' + bgBlur + 'px)' : 'none',
                }}),
                h('div', { style: {
                  position: 'absolute', inset: '0', display: 'flex',
                  alignItems: 'center', justifyContent: 'center',
                }},
                  h('span', { style: {
                    background: 'rgba(0,0,0,0.6)', color: '#fff', padding: '6px 14px',
                    borderRadius: '8px', fontSize: '12px', fontWeight: 500,
                  }}, bgSize + ' \u00B7 ' + bgPos + (bgBlur > 0 ? ' \u00B7 blur ' + bgBlur + 'px' : ''))
                )
              )
            ),

            // Section: Typography
            h('div', { style: { marginBottom: '24px' }},
              h('h3', { style: { fontFamily: headingFont, fontSize: '14px', fontWeight: 600, color: '#a1a1aa', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '10px' }}, 'Typography'),
              h('div', { style: { display: 'flex', gap: '16px', flexWrap: 'wrap' }},
                h('div', { style: { flex: 1, minWidth: '200px', background: '#18181b', borderRadius: '8px', padding: '14px', border: '1px solid #27272a' }},
                  h('div', { style: { color: '#71717a', fontSize: '10px', textTransform: 'uppercase', marginBottom: '6px' }}, 'Heading Font'),
                  h('div', { style: { fontFamily: headingFont, fontSize: (24 * headingScale) + 'px', fontWeight: 700, color: '#f4f4f5' }}, 'The Quick Brown Fox'),
                  h('div', { style: { fontFamily: headingFont, fontSize: (18 * headingScale) + 'px', fontWeight: 600, color: '#d4d4d8' }}, 'Jumps Over the Lazy Dog')
                ),
                h('div', { style: { flex: 1, minWidth: '200px', background: '#18181b', borderRadius: '8px', padding: '14px', border: '1px solid #27272a' }},
                  h('div', { style: { color: '#71717a', fontSize: '10px', textTransform: 'uppercase', marginBottom: '6px' }}, 'Body Font'),
                  h('div', { style: { fontFamily: bodyFont, fontSize: (14 * bodyScale) + 'px', color: '#f4f4f5', lineHeight: '1.6' }},
                    'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore.'
                  )
                )
              )
            ),

            // Section: Light & Dark side by side
            h('div', { style: { display: 'flex', gap: '16px', flexWrap: 'wrap' }},
              h('div', { style: { flex: 1, minWidth: '320px' }}, renderPanel(lt, false, '\u2600 Light Mode')),
              h('div', { style: { flex: 1, minWidth: '320px' }}, renderPanel(dk, true, '\uD83C\uDF19 Dark Mode'))
            )
          );
        },
      });
      CMS.registerPreviewTemplate('theme', ThemePreview);

      // ── Home Page preview template ──────────────────────────────────
      var HomePreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var getAsset = this.props.getAsset;
          var blocks = entry.getIn(['data', 'blocks']);
          var self = this;

          if (!blocks || blocks.size === 0) {
            return h('div', { style: { padding: '40px', textAlign: 'center', color: '#71717a' }},
              h('p', { style: { fontSize: '16px' } }, 'No blocks added yet.'),
              h('p', { style: { fontSize: '13px', marginTop: '8px' } }, 'Click "Add blocks" in the editor to get started.')
            );
          }

          function renderBlock(block, i) {
            var type = block.get('type');

            // ── Hero Banner ──
            if (type === 'hero') {
              var heading = block.get('heading') || '';
              var subheading = block.get('subheading') || '';
              var image = block.get('image');
              var overlay = block.get('overlay') !== false;
              var height = block.get('height') || 'medium';
              var heights = { small: '200px', medium: '300px', large: '400px', full: '500px' };
              var imgSrc = '';
              if (image) { try { imgSrc = getAsset(image).toString(); } catch(e) { imgSrc = image; } }

              return h('div', { key: i, style: {
                position: 'relative', minHeight: heights[height] || '300px',
                borderRadius: '10px', overflow: 'hidden', marginBottom: '20px',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: imgSrc ? 'none' : '#18181b',
              }},
                imgSrc && h('img', { src: imgSrc, style: {
                  position: 'absolute', inset: '0', width: '100%', height: '100%', objectFit: 'cover',
                }}),
                imgSrc && overlay && h('div', { style: {
                  position: 'absolute', inset: '0',
                  background: 'linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.3), transparent)',
                }}),
                h('div', { style: { position: 'relative', zIndex: 2, textAlign: 'center', padding: '24px' }},
                  heading && h('h1', { style: {
                    fontSize: '32px', fontWeight: 700, color: imgSrc ? '#fff' : '#f4f4f5',
                    margin: '0 0 8px 0',
                  }}, heading),
                  subheading && h('p', { style: {
                    fontSize: '16px', color: imgSrc ? 'rgba(255,255,255,0.9)' : '#a1a1aa',
                    maxWidth: '500px', margin: '0 auto',
                  }}, subheading)
                )
              );
            }

            // ── Profile Card ──
            if (type === 'profile') {
              var layout = block.get('layout') || 'center';
              var isRow = layout === 'row';
              var isCard = layout === 'card';

              var containerStyle = {
                marginBottom: '20px', padding: '20px',
                display: 'flex', gap: '16px', alignItems: 'center',
              };
              if (isRow) {
                containerStyle.flexDirection = 'row';
                containerStyle.textAlign = 'left';
              } else {
                containerStyle.flexDirection = 'column';
                containerStyle.textAlign = 'center';
              }
              if (isCard) {
                containerStyle.background = '#18181b';
                containerStyle.border = '1px solid #27272a';
                containerStyle.borderRadius = '10px';
                containerStyle.maxWidth = '380px';
                containerStyle.margin = '0 auto 20px auto';
              }

              return h('div', { key: i, style: containerStyle },
                h('div', { style: {
                  width: isCard ? '64px' : '80px', height: isCard ? '64px' : '80px',
                  borderRadius: '50%', background: '#3f3f46', border: '2px solid #52525b',
                  flexShrink: 0,
                }}),
                h('div', {},
                  h('h2', { style: { fontSize: '20px', fontWeight: 700, color: '#f4f4f5', margin: '0 0 4px 0' }}, 'Your Name'),
                  h('p', { style: { color: '#a1a1aa', margin: '0 0 4px 0', fontSize: '14px' }}, 'Your bio goes here'),
                  h('p', { style: { color: '#71717a', fontSize: '12px', margin: 0 }}, '\uD83D\uDCF7 Camera \u00B7 \uD83D\uDCCD Location')
                )
              );
            }

            // ── Recent Posts ──
            if (type === 'recentPosts') {
              var heading = block.get('heading') || 'Recent';
              var count = parseInt(block.get('count') || '6', 10);
              var columns = block.get('columns') || '3';
              var cols = parseInt(columns, 10);
              var displayCount = Math.min(count, 6);

              return h('div', { key: i, style: { marginBottom: '20px' }},
                heading && h('h2', { style: { fontSize: '18px', fontWeight: 600, color: '#f4f4f5', marginBottom: '12px' }}, heading),
                h('div', { style: {
                  display: 'grid',
                  gridTemplateColumns: 'repeat(' + cols + ', 1fr)',
                  gap: '12px',
                }},
                  Array.from({ length: displayCount }).map(function(_, j) {
                    return h('div', { key: j, style: {
                      background: '#18181b', borderRadius: '8px',
                      border: '1px solid #27272a', overflow: 'hidden',
                    }},
                      h('div', { style: {
                        paddingBottom: '75%', background: 'linear-gradient(135deg, #27272a 0%, #1a1a2e 100%)',
                        position: 'relative',
                      }},
                        h('div', { style: {
                          position: 'absolute', inset: '0', display: 'flex',
                          alignItems: 'center', justifyContent: 'center',
                        }},
                          h('span', { style: { color: '#3f3f46', fontSize: '24px' }}, '\uD83D\uDDBC')
                        )
                      ),
                      h('div', { style: { padding: '10px' }},
                        h('div', { style: { height: '12px', background: '#27272a', borderRadius: '4px', width: '70%', marginBottom: '6px' }}),
                        h('div', { style: { height: '10px', background: '#1f1f23', borderRadius: '4px', width: '40%' }})
                      )
                    );
                  })
                ),
                h('div', { style: { textAlign: 'center', marginTop: '14px' }},
                  h('span', { style: { color: '#3b82f6', fontSize: '13px', textDecoration: 'underline' }}, 'View all posts \u2192')
                )
              );
            }

            // ── YouTube Video ──
            if (type === 'youtube') {
              var url = block.get('url') || '';
              var heading = block.get('heading') || '';
              var caption = block.get('caption') || '';
              var layout = block.get('layout') || 'contained';
              var videoId = '';
              var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?\s]+)/);
              if (m) videoId = m[1];

              var wrapStyle = { marginBottom: '20px' };
              if (layout === 'contained') { wrapStyle.maxWidth = '640px'; wrapStyle.margin = '0 auto 20px auto'; }

              return h('div', { key: i, style: wrapStyle },
                heading && h('h2', { style: { fontSize: '18px', fontWeight: 600, color: '#f4f4f5', marginBottom: '8px' }}, heading),
                videoId
                  ? h('div', { style: { position: 'relative', paddingBottom: '56.25%', borderRadius: '10px', overflow: 'hidden', background: '#000' }},
                      h('iframe', {
                        src: 'https://www.youtube-nocookie.com/embed/' + videoId,
                        style: { position: 'absolute', inset: '0', width: '100%', height: '100%', border: 'none' },
                        allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture',
                        allowFullScreen: true,
                      })
                    )
                  : h('div', { style: {
                      paddingBottom: '56.25%', background: '#18181b', borderRadius: '10px',
                      border: '1px solid #27272a', position: 'relative',
                    }},
                      h('div', { style: {
                        position: 'absolute', inset: '0', display: 'flex',
                        alignItems: 'center', justifyContent: 'center', flexDirection: 'column',
                      }},
                        h('span', { style: { fontSize: '36px', marginBottom: '8px' }}, '\u25B6\uFE0F'),
                        h('span', { style: { color: '#71717a', fontSize: '13px' }}, 'Paste a YouTube URL')
                      )
                    ),
                caption && h('p', { style: { color: '#a1a1aa', fontSize: '13px', textAlign: 'center', marginTop: '8px' }}, caption)
              );
            }

            // ── Photo Gallery ──
            if (type === 'gallery') {
              var heading = block.get('heading') || '';
              var columns = block.get('columns') || '3';
              var images = block.get('images');
              var cols = parseInt(columns, 10);

              var galleryImages = [];
              if (images && images.size > 0) {
                images.forEach(function(img) {
                  var src = img.get('src');
                  var imgSrc = '';
                  if (src) { try { imgSrc = getAsset(src).toString(); } catch(e) { imgSrc = src; } }
                  galleryImages.push({
                    src: imgSrc,
                    alt: img.get('alt') || '',
                    caption: img.get('caption') || '',
                  });
                });
              }

              return h('div', { key: i, style: { marginBottom: '20px' }},
                heading && h('h2', { style: { fontSize: '18px', fontWeight: 600, color: '#f4f4f5', marginBottom: '12px' }}, heading),
                galleryImages.length > 0
                  ? h('div', { style: {
                      display: 'grid', gridTemplateColumns: 'repeat(' + cols + ', 1fr)', gap: '10px',
                    }},
                      galleryImages.map(function(img, j) {
                        return h('div', { key: j, style: { position: 'relative' }},
                          h('img', { src: img.src, alt: img.alt, style: {
                            width: '100%', aspectRatio: '1', objectFit: 'cover', borderRadius: '8px',
                            display: 'block',
                          }}),
                          img.caption && h('p', { style: { color: '#71717a', fontSize: '11px', marginTop: '4px' }}, img.caption)
                        );
                      })
                    )
                  : h('div', { style: {
                      padding: '40px', textAlign: 'center', background: '#18181b',
                      borderRadius: '10px', border: '1px solid #27272a',
                    }},
                      h('span', { style: { color: '#71717a', fontSize: '13px' }}, 'Add photos to this gallery block')
                    )
              );
            }

            // ── Text / Markdown ──
            if (type === 'text') {
              var heading = block.get('heading') || '';
              var body = block.get('body') || '';
              var layout = block.get('layout') || 'narrow';
              var wrapStyle = { marginBottom: '20px' };
              if (layout === 'narrow') { wrapStyle.maxWidth = '600px'; wrapStyle.margin = '0 auto 20px auto'; }

              return h('div', { key: i, style: wrapStyle },
                heading && h('h2', { style: { fontSize: '18px', fontWeight: 600, color: '#f4f4f5', marginBottom: '8px' }}, heading),
                h('div', { style: { color: '#d4d4d8', lineHeight: '1.7', fontSize: '14px', whiteSpace: 'pre-wrap' }}, body || h('span', { style: { color: '#71717a', fontStyle: 'italic' }}, 'Enter some text...'))
              );
            }

            // ── Image ──
            if (type === 'image') {
              var src = block.get('src');
              var alt = block.get('alt') || '';
              var caption = block.get('caption') || '';
              var layout = block.get('layout') || 'contained';
              var imgSrc = '';
              if (src) { try { imgSrc = getAsset(src).toString(); } catch(e) { imgSrc = src; } }

              var wrapStyle = { marginBottom: '20px' };
              if (layout === 'contained') { wrapStyle.maxWidth = '640px'; wrapStyle.margin = '0 auto 20px auto'; }
              if (layout === 'banner') { wrapStyle.maxHeight = '200px'; wrapStyle.overflow = 'hidden'; }

              return h('div', { key: i, style: wrapStyle },
                imgSrc
                  ? h('img', { src: imgSrc, alt: alt, style: {
                      width: '100%', borderRadius: '8px', display: 'block',
                      objectFit: layout === 'banner' ? 'cover' : 'contain',
                      maxHeight: layout === 'banner' ? '200px' : 'none',
                    }})
                  : h('div', { style: {
                      paddingBottom: '50%', background: '#18181b', borderRadius: '10px',
                      border: '1px solid #27272a', position: 'relative',
                    }},
                      h('div', { style: {
                        position: 'absolute', inset: '0', display: 'flex',
                        alignItems: 'center', justifyContent: 'center',
                      }},
                        h('span', { style: { color: '#71717a', fontSize: '13px' }}, 'Choose an image')
                      )
                    ),
                caption && h('p', { style: { color: '#a1a1aa', fontSize: '13px', textAlign: 'center', marginTop: '8px' }}, caption)
              );
            }

            // ── Location ──
            if (type === 'location') {
              var heading = block.get('heading') || 'Location';
              var address = block.get('address') || '';
              var mapUrl = block.get('mapUrl') || '';

              return h('div', { key: i, style: { marginBottom: '20px' }},
                heading && h('h2', { style: { fontSize: '18px', fontWeight: 600, color: '#f4f4f5', marginBottom: '8px' }}, heading),
                address && h('p', { style: { color: '#a1a1aa', fontSize: '14px', whiteSpace: 'pre-line', marginBottom: '12px' }}, address),
                mapUrl
                  ? h('div', { style: { borderRadius: '10px', overflow: 'hidden', aspectRatio: '16/9' }},
                      h('iframe', { src: mapUrl, style: { width: '100%', height: '100%', border: 'none' }, loading: 'lazy' })
                    )
                  : h('div', { style: {
                      aspectRatio: '16/9', background: '#18181b', borderRadius: '10px',
                      border: '1px solid #27272a', display: 'flex',
                      alignItems: 'center', justifyContent: 'center',
                    }},
                      h('span', { style: { color: '#71717a', fontSize: '13px' }}, '\uD83D\uDCCD Add a map embed URL')
                    )
              );
            }

            // ── Unknown block type ──
            return h('div', { key: i, style: {
              marginBottom: '20px', padding: '16px', background: '#1c1917',
              border: '1px solid #44403c', borderRadius: '8px',
            }},
              h('span', { style: { color: '#a8a29e', fontSize: '13px' }}, 'Unknown block: ' + type)
            );
          }

          return h('div', { style: { padding: '20px 24px', maxWidth: '800px', margin: '0 auto' }},
            blocks.map(function(block, i) { return renderBlock(block, i); })
          );
        },
      });
      CMS.registerPreviewTemplate('home', HomePreview);

      // Pages preview — same block rendering with title header
      var PagePreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var getAsset = this.props.getAsset;
          var title = entry.getIn(['data', 'title']) || '';
          var description = entry.getIn(['data', 'description']) || '';
          var slug = entry.getIn(['data', 'slug']) || '';
          var blocks = entry.getIn(['data', 'blocks']);

          return h('div', { style: { padding: '20px 24px', maxWidth: '800px', margin: '0 auto' }},
            title && h('div', { style: { marginBottom: '20px', paddingBottom: '16px', borderBottom: '1px solid #27272a' }},
              h('h1', { style: { fontSize: '28px', fontWeight: 700, color: '#f4f4f5', margin: '0 0 4px 0' }}, title),
              description && h('p', { style: { color: '#a1a1aa', fontSize: '14px', margin: '0 0 4px 0' }}, description),
              slug && h('p', { style: { color: '#3f3f46', fontSize: '12px', margin: 0 }}, '/p/' + slug)
            ),
            h(HomePreview, { entry: entry, getAsset: getAsset })
          );
        },
      });
      CMS.registerPreviewTemplate('pages', PagePreview);

      // Gallery preview template
      var GalleryPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var description = entry.getIn(['data', 'description']) || '';
          var coverImage = entry.getIn(['data', 'coverImage']);
          var photos = entry.getIn(['data', 'photos']);
          var body = this.props.widgetFor('body');

          return h('article', {},
            coverImage && h('img', { className: 'post-image', src: this.props.getAsset(coverImage).toString(), alt: title }),
            h('h1', {}, title),
            description && h('p', { className: 'post-description' }, description),
            photos && photos.size > 0 && h('div', { style: {
              display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',
              gap: '12px', marginBottom: '24px',
            }},
              photos.map(function(photo, i) {
                var src = photo.get('src');
                return src && h('div', { key: i, style: { position: 'relative' } },
                  h('img', {
                    src: this.props.getAsset(src).toString(),
                    alt: photo.get('alt') || '',
                    style: { width: '100%', height: '180px', objectFit: 'cover', borderRadius: '6px' },
                  }),
                  photo.get('caption') && h('p', {
                    style: { fontSize: '0.75rem', color: '#71717a', marginTop: '4px' },
                  }, photo.get('caption'))
                );
              }.bind(this))
            ),
            h('div', {}, body)
          );
        },
      });
      CMS.registerPreviewTemplate('galleries', GalleryPreview);
    </script>
  </body>
</html>
